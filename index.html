<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生産損益・損益分岐点計算ツール</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }
        .card h2 {
            margin-top: 0;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 8px;
            font-size: 1.2rem;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        input[type="number"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        textarea {
            height: 120px;
            font-family: monospace;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed var(--border-color);
            font-size: 1rem;
        }
        .result-row.total {
            border-bottom: none;
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 10px;
            padding-top: 15px;
            border-top: 2px solid var(--border-color);
        }
        .text-profit { color: var(--success-color); }
        .text-loss { color: var(--danger-color); font-weight: bold; }
        
        /* 100%ローカル用 グラフデザイン */
        .custom-chart-area {
            display: flex;
            flex-direction: column;
            height: 260px;
            width: 100%;
            border-left: 2px solid #ccc;
            position: relative;
            margin-top: 25px;
        }
        .chart-half {
            flex: 1;
            display: flex;
            align-items: flex-end;
        }
        .chart-half.bottom {
            align-items: flex-start;
        }
        .bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            margin: 0 4px;
            height: 100%;
            position: relative;
        }
        .chart-half.bottom .bar-wrapper {
            justify-content: flex-start;
        }
        .bar-element {
            width: 100%;
            transition: height 0.3s;
        }
        .bar-element.plus {
            background-color: var(--success-color);
            border-radius: 4px 4px 0 0;
        }
        .bar-element.minus {
            background-color: var(--danger-color);
            border-radius: 0 0 4px 4px;
        }
        .val-label {
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .chart-half.bottom .val-label {
            margin-bottom: 0;
            margin-top: 2px;
        }
        .axis-label {
            position: absolute;
            bottom: -38px;
            left: 50%;
            transform: translateX(-50%) rotate(-25deg);
            font-size: 0.75rem;
            white-space: nowrap;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 生産損益・損益分岐点計算ツール</h1>
    
    <div class="grid">
        <div class="card">
            <h2>⚙️ 計算条件・ログ入力</h2>
            <div class="form-group">
                <label>材料Aの重さ (g)</label>
                <input type="number" id="materialWeight" value="4" step="0.1">
            </div>
            <div class="form-group">
                <label>商品Aの単価 (g)</label>
                <input type="number" id="productPrice" value="8" step="0.1">
            </div>
            <div class="form-group">
                <label>加工費：商品1個あたり (g)</label>
                <input type="number" id="processCost" value="1.8" step="0.1">
            </div>
            <div class="form-group">
                <label>生産ログ（テキストをそのまま貼り付け）</label>
                <textarea id="logInput" placeholder="[12:39] x2&#10;[12:41] x4"></textarea>
            </div>
            <button onclick="calculateProfit()">🧮 損益を計算する</button>
        </div>
        
        <div class="card">
            <h2>📈 計算結果</h2>
            <div class="result-row">
                <span>総加工回数</span>
                <span id="resTotalRuns" style="font-weight: bold;">0 回</span>
            </div>
            <div class="result-row">
                <span>材料A 消費量 (個)</span>
                <span id="resMaterialUsed">0 個</span>
            </div>
            <div class="result-row">
                <span>商品A 製造数 (個)</span>
                <span id="resProductMade" style="font-weight: bold;">0 回</span>
            </div>
            <div class="result-row" style="padding-left: 15px; font-size: 0.9rem; color: #666;">
                <span>🟢 ベスト (x4)</span>
                <span id="resX4Count">0 回 (0%)</span>
            </div>
            <div class="result-row" style="padding-left: 15px; font-size: 0.9rem; color: #666;">
                <span>🟡 中央値 (x3)</span>
                <span id="resX3Count">0 回 (0%)</span>
            </div>
            <div class="result-row" style="padding-left: 15px; font-size: 0.9rem; color: #666;">
                <span>🔴 ワースト (x2)</span>
                <span id="resX2Count">0 回 (0%)</span>
            </div>
            <div class="result-row" style="margin-top: 15px;">
                <span>総売上高</span>
                <span id="resTotalRevenue">0 万円</span>
            </div>
            <div class="result-row">
                <span>総材料コスト</span>
                <span id="resMaterialCost">0 万円</span>
            </div>
            <div class="result-row">
                <span>総加工コスト</span>
                <span id="resProcessingCost">0 万円</span>
            </div>
            <div class="result-row total">
                <span>最終損益</span>
                <span id="resNetProfit">0 万円</span>
            </div>
        </div>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h2>📈 単価変動シミュレーション（設定値の±20%を5%刻みで表示）</h2>
        <div id="chartWrapper"></div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // デフォルトで前回の200回分の生産ログの最初の数行をサンプルセット
        document.getElementById('logInput').value = `[12:39] x2\n[12:41] x4\n[12:41] x3\n[12:41] x4\n[12:41] x4\n[12:41] x2`;
        calculateProfit();
    });

    function calculateProfit() {
        const matWeight = parseFloat(document.getElementById('materialWeight').value) || 0;
        const prodPriceG = parseFloat(document.getElementById('productPrice').value) || 0;
        const processCostG = parseFloat(document.getElementById('processCost').value) || 0;
        const logText = document.getElementById('logInput').value;

        // 金額レート換算 (1g = 1万円)
        const matCostPerPiece = matWeight * 1; 
        const sellPricePerPiece = prodPriceG * 1; 
        const processCostPerPiece = processCostG * 1; 

        // 生産ログの解析
        let x4 = 0, x3 = 0, x2 = 0;
        const lines = logText.split('\n');
        
        lines.forEach(line => {
            if (line.includes('x4')) x4++;
            else if (line.includes('x3')) x3++;
            else if (line.includes('x2')) x2++;
        });

        const totalRuns = x4 + x3 + x2;
        if (totalRuns === 0) return;

        // 数量計算
        const materialUsed = totalRuns * 5; 
        const productMade = (x4 * 4) + (x3 * 3) + (x2 * 2);

        // 基本の金額計算
        const totalRevenue = productMade * sellPricePerPiece;
        const totalMaterialCost = materialUsed * matCostPerPiece;
        const totalProcessingCost = productMade * processCostPerPiece; 
        const netProfit = totalRevenue - (totalMaterialCost + totalProcessingCost);

        // 画面への反映
        document.getElementById('resTotalRuns').innerText = totalRuns + " 回";
        document.getElementById('resMaterialUsed').innerText = materialUsed.toLocaleString() + " 個";
        document.getElementById('resProductMade').innerText = productMade.toLocaleString() + " 個";
        
        const pct = (val) => ((val / totalRuns) * 100).toFixed(1) + "%";
        document.getElementById('resX4Count').innerText = `${x4} 回 (${pct(x4)})`;
        document.getElementById('resX3Count').innerText = `${x3} 回 (${pct(x3)})`;
        document.getElementById('resX2Count').innerText = `${x2} 回 (${pct(x2)})`;

        document.getElementById('resTotalRevenue').innerText = totalRevenue.toLocaleString(undefined, {maximumFractionDigits: 2}) + " 万円";
        document.getElementById('resMaterialCost').innerText = totalMaterialCost.toLocaleString(undefined, {maximumFractionDigits: 2}) + " 万円";
        document.getElementById('resProcessingCost').innerText = totalProcessingCost.toLocaleString(undefined, {maximumFractionDigits: 2}) + " 万円";

        const profitEl = document.getElementById('resNetProfit');
        const formattedProfit = netProfit.toLocaleString(undefined, {maximumFractionDigits: 2}) + " 万円";
        if (netProfit >= 0) {
            profitEl.innerText = "＋" + formattedProfit;
            profitEl.className = "text-profit";
        } else {
            profitEl.innerText = formattedProfit;
            profitEl.className = "text-loss";
        }

        // --- 5%刻みのグラフデータ生成用計算 ---
        const totalCost = totalMaterialCost + totalProcessingCost;
        const steps = [-20, -15, -10, -5, 0, 5, 10, 15, 20]; 
        const labels = [];
        const profitData = [];

        steps.forEach(step => {
            const modifiedPrice = prodPriceG * (1 + step / 100);
            const modifiedProfit = (productMade * modifiedPrice) - totalCost;
            const sign = step > 0 ? "+" : "";
            labels.push(`${sign}${step}% (${modifiedPrice.toFixed(1)}g)`);
            profitData.push(parseFloat(modifiedProfit.toFixed(1)));
        });

        // 最も大きな絶対値を基準にしてグラフのスケールを合わせる
        let maxAbsVal = Math.max(...profitData.map(Math.abs), 10);

        // --- 純粋なHTMLとCSSのみで上下反転中央線グラフを生成 ---
        let html = `
            <div class="custom-chart-area">
                <!-- 上半分（プラス領域） -->
                <div class="chart-half">`;
        
        profitData.forEach((val) => {
            let heightPercent = val > 0 ? (val / maxAbsVal) * 100 : 0;
            html += `
                <div class="bar-wrapper">
                    <div class="val-label" style="color:var(--success-color); visibility:${val > 0 ? 'visible' : 'hidden'}">+${val}</div>
                    <div class="bar-element plus" style="height:${heightPercent}%;"></div>
                </div>`;
        });

        html += `</div>
                <!-- 中央の境界線（損益0ライン） -->
                <div style="height:2px; background-color:#333; width:100%; position:absolute; top:50%; left:0; z-index:10;"></div>
                <!-- 下半分（マイナス領域） -->
                <div class="chart-half bottom">`;

        profitData.forEach((val, idx) => {
            let heightPercent = val < 0 ? (Math.abs(val) / maxAbsVal) * 100 : 0;
            html += `
                <div class="bar-wrapper">
                    <div class="bar-element minus" style="height:${heightPercent}%;"></div>
                    <div class="val-label" style="color:var(--danger-color); visibility:${val < 0 ? 'visible' : 'hidden'}">${val}</div>
                    <div class="axis-label">${labels[idx]}</div>
                </div>`;
        });

        html += `</div>
            </div>
            <!-- ラベルが傾いてはみ出す分の余白スペース -->
            <div style="height:35px;"></div>`;
        
        // 組み立てたHTMLを画面に流し込む
        document.getElementById('chartWrapper').innerHTML = html;
    }
</script>
</body>
</html>
